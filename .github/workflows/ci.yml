name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install GL headers (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libegl1-mesa-dev xvfb

      - name: Create venv and install
        run: |
          uv venv --python ${{ matrix.python-version }} .venv
          uv pip install -e ".[dev]"
        continue-on-error: ${{ runner.os != 'Linux' }}
        id: install

      - name: Lint with ruff (Linux only)
        if: runner.os == 'Linux'
        run: uv run ruff check src/ tests/ --output-format=github
        continue-on-error: true

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: PYTHONPATH= xvfb-run -a uv run pytest --tb=short -q

      - name: Run tests (macOS)
        if: runner.os == 'macOS' && steps.install.outcome == 'success'
        run: PYTHONPATH= uv run pytest --tb=short -q

      - name: Run tests (Windows)
        if: runner.os == 'Windows' && steps.install.outcome == 'success'
        run: uv run pytest --tb=short -q

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build wheel + sdist
        run: uvx hatch build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
